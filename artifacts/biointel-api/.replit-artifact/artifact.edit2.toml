kind = "api"
  previewPath = "/backend"
  title = "BioIntel Python API"
  version = "1.0.0"
  id = "biointel-api"

  [[services]]
  localPort = 8000
  name = "BioIntel Python API"
  paths = ["/backend"]

  [services.development]
  run = "cd artifacts/biointel-api && python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  [services.production]

  [services.production.build]
  args = ["echo", "no build needed"]

  [services.production.run]
  args = ["python3", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  [services.production.run.env]
  PORT = "8000"

  [services.production.health.startup]
  path = "/backend/health"
  