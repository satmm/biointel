kind = "web"
previewPath = "/"
title = "BioIntel"
version = "1.0.0"
id = "artifacts/biointel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23720

[services.development]
run = "pnpm --filter @workspace/biointel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biointel", "run", "build" ]
publicDir = "artifacts/biointel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23720"
BASE_PATH = "/"
